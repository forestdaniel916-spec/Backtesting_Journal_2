<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackTest • Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
        }
        
        .trade-row:hover {
            background: rgba(59, 130, 246, 0.08);
            transform: translateX(4px);
        }
        
        .pnl-positive { color: #22c55e; }
        .pnl-negative { color: #ef4444; }
        
        .sidebar-link.active {
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid rgb(59 130 246);
        }
        
        .modal {
            animation: fadeInScale 0.2s ease-out;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">BT</div>
                    <div>
                        <div class="title-font text-3xl font-semibold tracking-tighter">BackTest</div>
                        <div class="text-xs text-zinc-500 -mt-1">trading journal v1.0</div>
                    </div>
                </div>
            </div>

            <div class="px-4 pt-6">
                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-3">PERIOD</div>
                <select class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                    <option>February 2025</option>
                </select>
            </div>

            <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
                <a onclick="navigateTo('dashboard')" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-2xl text-sm cursor-pointer">
                    <i class="fas fa-chart-line w-5"></i> Dashboard
                </a>
                <a onclick="navigateTo('journal')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl text-sm cursor-pointer">
                    <i class="fas fa-book w-5"></i> Trade Journal
                </a>
                <a onclick="navigateTo('review')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl text-sm cursor-pointer">
                    <i class="fas fa-search w-5"></i> Trade Study Review
                </a>
                <a onclick="navigateTo('analytics')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl text-sm cursor-pointer">
                    <i class="fas fa-chart-bar w-5"></i> Analytics
                </a>
                <a onclick="navigateTo('calendar')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl text-sm cursor-pointer">
                    <i class="fas fa-calendar w-5"></i> Calendar
                </a>
            </nav>

            <div class="p-4 border-t border-zinc-800 mt-auto">
                <div onclick="toggleTheme()" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer">
                    <i id="theme-icon" class="fas fa-moon w-5"></i>
                    <span>Dark Mode</span>
                </div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col">
            <!-- Top Bar -->
            <div class="h-16 border-b border-zinc-800 bg-zinc-900/95 backdrop-blur-md flex items-center px-8 justify-between">
                <h1 id="page-title" class="text-2xl font-semibold title-font">Dashboard</h1>
                
                <div class="flex items-center gap-4">
                    <button onclick="newTrade()" 
                            class="flex items-center gap-2 bg-white text-black px-6 py-2.5 rounded-2xl font-medium hover:bg-white/90 transition-all">
                        <i class="fas fa-plus"></i>
                        <span>New Trade</span>
                    </button>
                    <div class="w-8 h-8 bg-zinc-700 rounded-xl flex items-center justify-center cursor-pointer">👤</div>
                </div>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-auto p-8" id="main-content">
                <!-- Dashboard -->
                <div id="dashboard-page">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="glass border border-zinc-700 rounded-3xl p-6">
                            <div class="text-xs text-zinc-500">WIN RATE</div>
                            <div class="text-6xl font-bold mt-4" id="win-rate">100%</div>
                        </div>
                        <div class="glass border border-zinc-700 rounded-3xl p-6">
                            <div class="text-xs text-zinc-500">TOTAL P&amp;L</div>
                            <div class="text-6xl font-bold mt-4 text-emerald-400" id="total-pnl">$240.00</div>
                        </div>
                        <div class="glass border border-zinc-700 rounded-3xl p-6">
                            <div class="text-xs text-zinc-500">BALANCE</div>
                            <div class="text-6xl font-bold mt-4">$10,240.00</div>
                        </div>
                        <div class="glass border border-zinc-700 rounded-3xl p-6">
                            <div class="flex justify-between">
                                <div><span class="text-emerald-400 text-4xl font-bold">1</span><br><span class="text-xs text-zinc-500">WINS</span></div>
                                <div><span class="text-red-400 text-4xl font-bold">0</span><br><span class="text-xs text-zinc-500">LOSSES</span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Journal Page -->
                <div id="journal-page" class="hidden">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-semibold">Trade Journal</h2>
                        <button onclick="newTrade()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl flex items-center gap-2">
                            <i class="fas fa-plus"></i> New Trade
                        </button>
                    </div>

                    <input type="text" id="search" placeholder="Search trades..." 
                           class="w-full max-w-md bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-blue-500"
                           onkeyup="filterTrades()">

                    <div class="glass border border-zinc-700 rounded-3xl overflow-hidden">
                        <table class="w-full">
                            <thead class="bg-zinc-950 sticky top-0">
                                <tr class="text-xs text-zinc-400 border-b border-zinc-800">
                                    <th class="text-left py-5 px-8">ID</th>
                                    <th class="text-left py-5 px-8">Date</th>
                                    <th class="text-left py-5 px-8">Asset</th>
                                    <th class="text-left py-5 px-8">Direction</th>
                                    <th class="text-right py-5 px-8">Entry</th>
                                    <th class="text-right py-5 px-8">Exit</th>
                                    <th class="text-right py-5 px-8">P&amp;L</th>
                                    <th class="text-center py-5 px-8">RR</th>
                                    <th class="text-center py-5 px-8">Rules</th>
                                    <th class="w-16"></th>
                                </tr>
                            </thead>
                            <tbody id="journal-body" class="divide-y divide-zinc-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Trade Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 w-full max-w-3xl mx-4 rounded-3xl max-h-[92vh] overflow-auto">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-2xl font-semibold">Log New Trade</h3>
                    <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
                </div>

                <div class="grid grid-cols-2 gap-6" id="form-content"></div>

                <div class="mt-10 border border-zinc-700 rounded-3xl p-6">
                    <div class="flex justify-between mb-4">
                        <span class="font-medium">Rules of Engagement</span>
                        <span id="rules-count" class="font-mono text-emerald-400">0/5</span>
                    </div>
                    <div id="rules-list" class="space-y-3"></div>
                </div>

                <div class="mt-8 flex gap-4">
                    <button onclick="saveTrade()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold">Save Trade</button>
                    <button onclick="closeModal()" class="flex-1 border border-zinc-700 hover:bg-zinc-800 py-4 rounded-2xl">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trades = [];
        let nextId = 1;
        let currentPage = 'dashboard';

        const rulesList = [
            "No Trades on Monday",
            "Keep the Daily Trend in mind",
            "If previous day is bullish on bearish trend, avoid",
            "If previous day is bearish on bullish trend, avoid",
            "Ideal setup: PD Array in previous day's range"
        ];

        function navigateTo(page) {
            currentPage = page;
            document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
            
            document.getElementById('dashboard-page').classList.add('hidden');
            document.getElementById('journal-page').classList.add('hidden');

            if (page === 'dashboard') {
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('page-title').textContent = 'Dashboard';
                document.querySelectorAll('.sidebar-link')[0].classList.add('active');
            } else if (page === 'journal') {
                document.getElementById('journal-page').classList.remove('hidden');
                document.getElementById('page-title').textContent = 'Trade Journal';
                document.querySelectorAll('.sidebar-link')[1].classList.add('active');
                renderJournal();
            }
        }

        function newTrade() {
            document.getElementById('modal').classList.remove('hidden');
            renderForm();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function renderForm() {
            const html = `
                <div class="space-y-5">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">DATE</label>
                        <input type="date" id="date" value="2025-02-01" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">ASSET</label>
                        <input id="asset" value="EURUSD" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">DIRECTION</label>
                        <div class="flex gap-2">
                            <button onclick="this.classList.add('bg-emerald-600','text-white');this.nextElementSibling.classList.remove('bg-emerald-600','text-white')" 
                                    class="flex-1 py-4 rounded-2xl bg-emerald-600 text-white">LONG</button>
                            <button onclick="this.classList.add('bg-emerald-600','text-white');this.previousElementSibling.classList.remove('bg-emerald-600','text-white')" 
                                    class="flex-1 py-4 rounded-2xl border border-zinc-700">SHORT</button>
                        </div>
                    </div>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">ENTRY PRICE</label>
                        <input id="entry" type="number" step="0.00001" value="1.0825" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">EXIT PRICE</label>
                        <input id="exit" type="number" step="0.00001" value="1.0880" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">P&amp;L ($)</label>
                        <input id="pnl" type="number" value="120" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    </div>
                </div>
            `;
            document.getElementById('form-content').innerHTML = html;
            renderRules();
        }

        function renderRules() {
            const container = document.getElementById('rules-list');
            container.innerHTML = rulesList.map((rule, i) => `
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="rule${i}" class="mt-1 accent-emerald-500" onchange="updateRuleCount()">
                    <span class="text-sm">${rule}</span>
                </label>
            `).join('');
        }

        function updateRuleCount() {
            const checked = document.querySelectorAll('#rules-list input:checked').length;
            document.getElementById('rules-count').textContent = `${checked}/5`;
        }

        function saveTrade() {
            const trade = {
                id: nextId++,
                date: document.getElementById('date').value,
                asset: document.getElementById('asset').value || "EURUSD",
                direction: "LONG",
                entry: parseFloat(document.getElementById('entry').value),
                exit: parseFloat(document.getElementById('exit').value),
                pnl: parseFloat(document.getElementById('pnl').value),
                rr: "1:2.4",
                rulesFollowed: document.querySelectorAll('#rules-list input:checked').length
            };

            trades.unshift(trade);
            closeModal();
            if (currentPage === 'journal') renderJournal();
            
            showToast("Trade saved successfully");
        }

        function renderJournal() {
            const tbody = document.getElementById('journal-body');
            tbody.innerHTML = trades.map(t => `
                <tr class="trade-row">
                    <td class="px-8 py-6 font-mono">#${t.id}</td>
                    <td class="px-8 py-6">${t.date}</td>
                    <td class="px-8 py-6 font-medium">${t.asset}</td>
                    <td class="px-8 py-6">
                        <span class="px-4 py-1 text-xs bg-emerald-900 text-emerald-400 rounded-full">${t.direction}</span>
                    </td>
                    <td class="px-8 py-6 text-right font-mono">${t.entry}</td>
                    <td class="px-8 py-6 text-right font-mono">${t.exit}</td>
                    <td class="px-8 py-6 text-right font-semibold ${t.pnl > 0 ? 'pnl-positive' : 'pnl-negative'}">
                        ${t.pnl > 0 ? '+' : ''}$${t.pnl}
                    </td>
                    <td class="px-8 py-6 text-center font-mono">${t.rr}</td>
                    <td onclick="showRules(${t.id})" class="px-8 py-6 text-center cursor-pointer hover:text-blue-400 font-mono">
                        ${t.rulesFollowed}/5
                    </td>
                    <td class="px-8 py-6">
                        <button onclick="deleteTrade(${t.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-500">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTrades() {
            const term = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('#journal-body tr');
            rows.forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function showRules(id) {
            const trade = trades.find(t => t.id === id);
            if (trade) alert(`Trade #${trade.id} Rules\n\n${trade.rulesFollowed} out of 5 rules followed.`);
        }

        function deleteTrade(id) {
            if (confirm("Delete this trade?")) {
                trades = trades.filter(t => t.id !== id);
                renderJournal();
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-8 right-8 bg-emerald-600 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50";
            toast.innerHTML = `✅ ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        // Initialize
        window.onload = () => {
            // Demo data
            trades = [
                { id: 2, date: "2025-02-01", asset: "EURUSD", direction: "LONG", entry: 1.0825, exit: 1.0880, pnl: 120, rr: "1:2.4", rulesFollowed: 4 },
                { id: 1, date: "2025-01-31", asset: "GBPUSD", direction: "SHORT", entry: 1.2650, exit: 1.2620, pnl: -45, rr: "1:1.8", rulesFollowed: 3 }
            ];
            nextId = 3;
            navigateTo('dashboard');
        };
    </script>
</body>
</html>
